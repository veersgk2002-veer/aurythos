<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
<h2>Your Vault</h2>

<input type="file" id="file">
<button onclick="upload()">Upload</button>

<div id="files"></div>

<button onclick="logout()" style="background:red;">Logout</button>
</div>

<script>
const token = localStorage.getItem("token");
if(!token) location="login.html";

function load(){
fetch("/files",{headers:{Authorization:token}})
.then(res=>res.json())
.then(data=>{
  const div = document.getElementById("files");
  div.innerHTML="";

  data.forEach(f=>{
    div.innerHTML += `
    <div class="file">
      ${f.original}<br>
      <button onclick="download('${f.filename}')">Download</button>
      <button onclick="del('${f.filename}')">Delete</button>
      <button onclick="share('${f.filename}')">Share</button>
    </div>`;
  });
});
}

function upload(){
  const f = document.getElementById("file").files[0];
  const fd = new FormData();
  fd.append("file", f);

  fetch("/upload",{
    method:"POST",
    headers:{Authorization:token},
    body:fd
  }).then(()=>load());
}

function download(name){
  fetch("/download/"+name,{
    headers:{Authorization:token}
  })
  .then(res=>res.blob())
  .then(blob=>{
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = name;
    a.click();
  });
}

function del(name){
  fetch("/delete/"+name,{
    method:"DELETE",
    headers:{Authorization:token}
  }).then(()=>load());
}

function share(name){
  const user = prompt("Enter username:");
  fetch("/share",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:token
    },
    body: JSON.stringify({filename:name,toUser:user})
  }).then(()=>load());
}

function logout(){
  localStorage.removeItem("token");
  location="login.html";
}

load();
</script>

</body>
</html>
