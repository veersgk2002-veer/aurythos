<!DOCTYPE html>
<html>
<head>
<title>Vault</title>
<style>
body {font-family:sans-serif;background:#f5f7fb;padding:20px;}
button {background:#2f6fed;color:white;border:none;padding:8px;}
.file {background:white;margin:10px 0;padding:10px;}
</style>
</head>
<body>

<h2>Your Vault</h2>

<input type="file" id="files" multiple>
<button onclick="upload()">Upload</button>

<div id="list"></div>

<script>
const token = localStorage.getItem("token");

if(!token){
  window.location.href="/";
}

async function load(){
  const res = await fetch("/api/files",{
    headers:{Authorization:"Bearer "+token}
  });

  const files = await res.json();

  let html="";
  files.forEach(f=>{
    html += `
    <div class="file">
      ${f}
      <button onclick="download('${f}')">Download</button>
      <button onclick="del('${f}')">Delete</button>
    </div>`;
  });

  document.getElementById("list").innerHTML = html;
}

async function upload(){
  const input = document.getElementById("files");
  const formData = new FormData();

  for(let i=0;i<input.files.length;i++){
    formData.append("files", input.files[i]);
  }

  await fetch("/api/upload",{
    method:"POST",
    headers:{Authorization:"Bearer "+token},
    body:formData
  });

  load();
}

function download(f){
  window.open("/api/download/"+f+"?token="+token);
}

async function del(f){
  await fetch("/api/delete/"+f,{
    method:"DELETE",
    headers:{Authorization:"Bearer "+token}
  });
  load();
}

load();
</script>

</body>
</html>
