<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}

body {
  background: #f8fafc;
  color: #0f172a;
}

.header {
  display: flex;
  justify-content: space-between;
  padding: 16px;
  background: white;
  border-bottom: 1px solid #e2e8f0;
}

.title {
  font-weight: 600;
}

.logout {
  color: #64748b;
  font-size: 14px;
}

.container {
  padding: 16px;
}

.upload-box {
  background: white;
  padding: 16px;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
  margin-bottom: 20px;
}

.upload-btn {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
}

.file {
  background: white;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
}

.file-name {
  font-size: 14px;
  color: #334155;
}

.actions button {
  margin-left: 6px;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
}

.download {
  background: #22c55e;
  color: white;
}

.delete {
  background: #ef4444;
  color: white;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Aurythos Vault</div>
  <div class="logout" onclick="logout()">Logout</div>
</div>

<div class="container">

  <div class="upload-box">
    <input type="file" id="file" multiple>
    <button class="upload-btn" onclick="upload()">Upload File</button>
  </div>

  <div id="files"></div>

</div>

<script>
const token = localStorage.getItem("token");

function logout(){
  localStorage.clear();
  window.location = "/";
}

async function loadFiles(){
  const res = await fetch("/api/files", {
    headers:{ authorization: token }
  });

  const files = await res.json();
  const container = document.getElementById("files");

  container.innerHTML = "";

  files.forEach(file=>{
    container.innerHTML += `
      <div class="file">
        <div>${file}</div>
        <div>
          <button onclick="download('${file}')">Download</button>
          <button onclick="share('${file}')">Share</button>
          <button onclick="del('${file}')">Delete</button>
        </div>
      </div>
    `;
  });
}

// MULTIPLE UPLOAD
async function upload(){
  const files = document.getElementById("file").files;

  if(files.length === 0){
    alert("Select file");
    return;
  }

  const form = new FormData();

  for(let i=0; i<files.length; i++){
    form.append("files", files[i]); // must be "files"
  }

  await fetch("/api/upload", {
    method:"POST",
    headers:{ authorization: token },
    body: form
  });

  loadFiles();
}

function download(file){
  window.open(`/uploads/${localStorage.getItem("username")}/${file}`);
}

// SHARE
async function share(file){
  const toUser = prompt("Enter username to share:");
  if(!toUser) return;

  await fetch("/api/share", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      authorization: token
    },
    body: JSON.stringify({ file, toUser })
  });

  alert("Shared");
}

// DELETE
async function del(file){
  await fetch("/api/delete/"+file,{
    method:"DELETE",
    headers:{ authorization: token }
  });

  loadFiles();
}

loadFiles();
</script>
</body>
</html>
