<!DOCTYPE html>
<html>
<head>
  <title>Aurythos Vault</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container">
  <h2>Your Vault</h2>

  <p>Files: <span id="fileCount">0</span>/5</p>
  <p>Storage: <span id="storageUsed">0</span>MB / 10MB</p>

  <form id="uploadForm">
    <input type="file" id="fileInput" required>
    <button type="submit">Upload Files</button>
  </form>

  <button id="upgradeBtn">Upgrade ₹99</button>

  <h3>Your Files</h3>
  <div id="fileList"></div>

  <a href="/logout">Logout</a>
</div>

<!-- FORCE LOAD JS -->
<script src="/app.js?v=2"></script>

</body>
</html>
