<!DOCTYPE html>
<html>
<head>
<title>Aurythos Vault</title>
<style>
body{
    font-family:sans-serif;
    background:#0f2027;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    background:#203a43;
    padding:20px;
    border-radius:10px;
}
input,button{
    display:block;
    margin:10px 0;
    padding:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>Aurythos Vault</h2>

<input id="u" placeholder="Username">
<input id="p" placeholder="Password" type="password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

</div>

<script>
function register(){
    fetch("/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:u.value,
            password:p.value
        })
    })
    .then(r=>r.json())
    .then(d=>{
        localStorage.setItem("token",d.token);
        location.href="/dashboard.html";
    });
}

function login(){
    fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:u.value,
            password:p.value
        })
    })
    .then(r=>r.json())
    .then(d=>{
        localStorage.setItem("token",d.token);
        location.href="/dashboard.html";
    });
}
</script>

</body>
</html>
