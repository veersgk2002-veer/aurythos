<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurythos Vault</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}

body {
  background: #f8fafc;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 90%;
  max-width: 360px;
  background: white;
  padding: 28px;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
}

.title {
  font-size: 20px;
  font-weight: 600;
  color: #0f172a;
  text-align: center;
  margin-bottom: 20px;
}

.input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
  outline: none;
}

.input:focus {
  border-color: #2563eb;
}

.button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: #2563eb;
  color: white;
  font-weight: 500;
}

.button:hover {
  background: #1d4ed8;
}

.secondary {
  background: white;
  border: 1px solid #e2e8f0;
  color: #64748b;
}
</style>
</head>

<body>

<div class="card">
  <div class="title">Aurythos Vault</div>

  <input id="username" class="input" placeholder="Username">
  <input id="password" class="input" type="password" placeholder="Password">

  <button class="button" onclick="login()">Login</button>
  <button class="button secondary" onclick="register()">Create Account</button>
</div>

<script>
async function register() {
  await fetch("/api/register", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      username: username.value,
      password: password.value
    })
  });
  alert("Account created");
}

async function login() {
  const res = await fetch("/api/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      username: username.value,
      password: password.value
    })
  });

  const data = await res.json();

  localStorage.setItem("token", data.token);
  localStorage.setItem("username", data.username);

  window.location = "/vault";
}
</script>

</body>
</html>
